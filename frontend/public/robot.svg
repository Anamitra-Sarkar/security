<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 220" fill="none" role="img" aria-label="Zynera robot assistant">
  <defs>
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#1E40AF"/>
    </linearGradient>
    <linearGradient id="headGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="eyeGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>
    <filter id="glowBlue">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#1E40AF" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- ─── Legs ──────────────────────────────────────────────────────── -->
  <rect x="36" y="172" width="16" height="38" rx="6" fill="#1E40AF" id="robot-leg-l"/>
  <rect x="66" y="172" width="16" height="38" rx="6" fill="#1E40AF" id="robot-leg-r"/>
  <!-- Feet -->
  <rect x="30" y="200" width="28" height="12" rx="5" fill="#1D4ED8" id="robot-foot-l"/>
  <rect x="60" y="200" width="28" height="12" rx="5" fill="#1D4ED8" id="robot-foot-r"/>

  <!-- ─── Torso ──────────────────────────────────────────────────────── -->
  <rect x="24" y="100" width="72" height="76" rx="14" fill="url(#bodyGrad)" id="robot-torso" filter="url(#shadow)"/>

  <!-- Chest panel -->
  <rect x="36" y="112" width="48" height="32" rx="8" fill="#1E3A8A" id="robot-chest-panel"/>
  <!-- Status LEDs -->
  <circle cx="48" cy="122" r="4" fill="#38BDF8" id="robot-led-1"/>
  <circle cx="60" cy="122" r="4" fill="#34D399" id="robot-led-2"/>
  <circle cx="72" cy="122" r="4" fill="#F59E0B" id="robot-led-3"/>
  <!-- Progress bar -->
  <rect x="40" y="133" width="40" height="5" rx="2.5" fill="#0F172A" id="robot-bar-bg"/>
  <rect x="40" y="133" width="25" height="5" rx="2.5" fill="#0EA5E9" id="robot-bar-fill"/>

  <!-- ─── Neck ──────────────────────────────────────────────────────── -->
  <rect x="48" y="84" width="24" height="20" rx="6" fill="#2563EB" id="robot-neck"/>

  <!-- ─── Head ──────────────────────────────────────────────────────── -->
  <rect x="20" y="32" width="80" height="56" rx="16" fill="url(#headGrad)" id="robot-head" filter="url(#shadow)"/>

  <!-- Antenna -->
  <rect x="56" y="14" width="8" height="22" rx="4" fill="#3B82F6" id="robot-antenna-stem"/>
  <circle cx="60" cy="11" r="7" fill="#38BDF8" id="robot-antenna-tip" filter="url(#glowBlue)"/>

  <!-- Eye sockets -->
  <rect x="30" y="46" width="24" height="18" rx="6" fill="#0F172A" id="robot-eye-socket-l"/>
  <rect x="66" y="46" width="24" height="18" rx="6" fill="#0F172A" id="robot-eye-socket-r"/>

  <!-- Eyes (animated) -->
  <ellipse cx="42" cy="55" rx="8" ry="7" fill="url(#eyeGrad)" id="robot-eye-l" class="robot-eye"/>
  <ellipse cx="78" cy="55" rx="8" ry="7" fill="url(#eyeGrad)" id="robot-eye-r" class="robot-eye"/>
  <!-- Eye glints -->
  <circle cx="45" cy="52" r="2.5" fill="white" opacity="0.55" id="robot-glint-l"/>
  <circle cx="81" cy="52" r="2.5" fill="white" opacity="0.55" id="robot-glint-r"/>

  <!-- Mouth indicator bar -->
  <rect x="36" y="74" width="48" height="7" rx="3.5" fill="#0F172A" id="robot-mouth-bg"/>
  <rect x="40" y="75.5" width="40" height="4" rx="2" fill="#38BDF8" opacity="0.65" id="robot-mouth-bar"/>

  <!-- ─── Left arm ────────────────────────────────────────────────────── -->
  <rect x="4" y="108" width="22" height="52" rx="10" fill="#2563EB" id="robot-arm-l"/>
  <rect x="2" y="152" width="26" height="20" rx="8" fill="#3B82F6" id="robot-hand-l"/>

  <!-- ─── Right arm + magnifying glass ──────────────────────────────── -->
  <g id="robot-magnifier" class="robot-magnifier">
    <rect x="94" y="108" width="22" height="52" rx="10" fill="#2563EB" id="robot-arm-r"/>
    <rect x="92" y="152" width="26" height="20" rx="8" fill="#3B82F6" id="robot-hand-r"/>
    <!-- Magnifying glass handle -->
    <line x1="112" y1="170" x2="122" y2="186" stroke="#1E40AF" stroke-width="4" stroke-linecap="round"/>
    <!-- Magnifying glass lens ring -->
    <circle cx="106" cy="160" r="14" stroke="#0EA5E9" stroke-width="3" fill="#DBEAFE" fill-opacity="0.25" id="magnifier-ring"/>
    <!-- Magnifying glass cross-hair -->
    <line x1="99" y1="160" x2="113" y2="160" stroke="#0EA5E9" stroke-width="1.5" opacity="0.6"/>
    <line x1="106" y1="153" x2="106" y2="167" stroke="#0EA5E9" stroke-width="1.5" opacity="0.6"/>
  </g>

  <!-- ─── Thumbs-up (hidden by default, shown on success) ──────────── -->
  <g id="robot-thumb" class="robot-thumb" data-visible="false">
    <!-- Thumb arm raised -->
    <rect x="4" y="90" width="22" height="50" rx="10" fill="#10B981" id="robot-arm-success"/>
    <!-- Thumb hand -->
    <rect x="2" y="82" width="26" height="22" rx="8" fill="#34D399" id="robot-hand-success"/>
    <!-- Thumb up icon -->
    <path d="M8 96 Q8 86 15 84 L22 84 L22 96" fill="#065F46" id="thumb-shape"/>
    <rect x="6" y="96" width="18" height="12" rx="3" fill="#065F46" id="thumb-base"/>
  </g>

  <!-- ─── Pulse ring (shown during loading) ──────────────────────────── -->
  <circle cx="60" cy="60" r="50" stroke="#38BDF8" stroke-width="2" fill="none" opacity="0"
          id="robot-pulse" class="robot-pulse-ring"/>
</svg>
