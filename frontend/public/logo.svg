<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 56" fill="none" role="img" aria-label="Zynera logo">
  <defs>
    <linearGradient id="zg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E40AF"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E40AF" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#10B981" stop-opacity="0.12"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Icon mark: stylised Z in a rounded-square -->
  <rect x="2" y="2" width="52" height="52" rx="12" fill="url(#bg)" stroke="url(#zg)" stroke-width="1.5"/>
  <!-- Circuit nodes -->
  <circle cx="12" cy="12" r="2.5" fill="#3B82F6" opacity="0.6"/>
  <circle cx="44" cy="44" r="2.5" fill="#10B981" opacity="0.6"/>
  <line x1="12" y1="12" x2="22" y2="12" stroke="#3B82F6" stroke-width="1" opacity="0.4"/>
  <line x1="34" y1="44" x2="44" y2="44" stroke="#10B981" stroke-width="1" opacity="0.4"/>
  <!-- Bold Z letterform -->
  <path d="M13 16 L43 16 L15 40 L43 40" stroke="url(#zg)" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#glow)"/>

  <!-- Wordmark -->
  <text x="64" y="36" font-family="'Geist', 'Inter', system-ui, sans-serif" font-size="26" font-weight="700" letter-spacing="-0.5" fill="url(#zg)">zynera</text>
</svg>
