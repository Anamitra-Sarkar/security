<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" role="img" aria-label="Zynera icon">
  <defs>
    <linearGradient id="zg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E40AF"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E40AF" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#10B981" stop-opacity="0.12"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Rounded-square background -->
  <rect x="2" y="2" width="60" height="60" rx="14" fill="url(#bg)" stroke="url(#zg)" stroke-width="2"/>
  <!-- Circuit accent nodes -->
  <circle cx="13" cy="13" r="2.5" fill="#3B82F6" opacity="0.6"/>
  <circle cx="51" cy="51" r="2.5" fill="#10B981" opacity="0.6"/>
  <line x1="13" y1="13" x2="24" y2="13" stroke="#3B82F6" stroke-width="1.2" opacity="0.4"/>
  <line x1="40" y1="51" x2="51" y2="51" stroke="#10B981" stroke-width="1.2" opacity="0.4"/>
  <!-- Bold Z letterform -->
  <path d="M14 19 L50 19 L16 45 L50 45" stroke="url(#zg)" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#glow)"/>
</svg>
