# Render deployment configuration
# See: https://render.com/docs/yaml-spec
services:
  # Backend API
  - type: web
    name: sentinel-api
    runtime: docker
    dockerfilePath: ./Dockerfile.backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sentinel-db
          property: connectionString
      - key: REDIS_URL
        value: "${REDIS_URL}"
      - key: HF_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: SENTRY_DSN
        sync: false
      - key: CORS_ORIGINS
        value: "https://sentinel-app.vercel.app,http://localhost:3000"
    healthCheckPath: /health
    scaling:
      minInstances: 1
      maxInstances: 3
      targetMemoryPercent: 75

  # Worker
  - type: worker
    name: sentinel-worker
    runtime: docker
    dockerfilePath: ./Dockerfile.worker
    envVars:
      - key: REDIS_URL
        value: "${REDIS_URL}"
      - key: HF_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false

databases:
  - name: sentinel-db
    plan: starter
    databaseName: sentinel
    postgresMajorVersion: "16"
