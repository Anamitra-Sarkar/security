# Sync repository to Hugging Face Spaces
# - Pushes Docker backend to HF_BACKEND_SPACE_REPO (sdk: docker, port 7860)
# - Pushes frontend build to HF_SPACE_REPO_URL (sdk: static)
name: HF Space Sync

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Deploy Docker backend to HuggingFace Spaces
  sync-backend-to-hf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push backend Docker to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_API_KEY }}
          HF_BACKEND_SPACE: ${{ secrets.HF_BACKEND_SPACE_REPO }}
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "GitHub Actions"

          if [ -n "$HF_BACKEND_SPACE" ] && [ -n "$HF_TOKEN" ]; then
            # Clone HF backend Space (or init fresh)
            git clone "https://user:${HF_TOKEN}@huggingface.co/spaces/${HF_BACKEND_SPACE}" /tmp/hf-backend || \
              mkdir -p /tmp/hf-backend && git -C /tmp/hf-backend init

            # HF Space metadata (sdk: docker tells HF to build the Dockerfile)
            cat > /tmp/hf-backend/README.md << 'EOF'
          ---
          title: Sentinel Backend API
          emoji: 🔒
          colorFrom: blue
          colorTo: red
          sdk: docker
          pinned: false
          app_port: 7860
          ---

          # Sentinel Backend API

          FastAPI backend for the Sentinel LLM Misuse Detection System.
          Exposes a REST API on port 7860 for AI-generated text detection.

          ## Required Secrets (set in Space Settings)
          - `DATABASE_URL` – PostgreSQL connection string
          - `REDIS_URL` – Redis connection string
          - `HF_API_KEY` – HuggingFace API token
          - `GROQ_API_KEY` – Groq API key
          - `JWT_SECRET` – Secret for JWT signing
          - `CORS_ORIGINS` – Comma-separated allowed origins (e.g. your Vercel URL)
          EOF

            # Dockerfile for HF Spaces (exposes port 7860)
            cp Dockerfile.hf_space /tmp/hf-backend/Dockerfile

            # Copy backend application code
            cp -r backend/ /tmp/hf-backend/backend/
            cp alembic.ini /tmp/hf-backend/

            # Push to HF Spaces
            cd /tmp/hf-backend
            git add .
            git commit -m "Deploy backend from GitHub $(date -u +%Y-%m-%dT%H:%M:%SZ)" || true
            git push "https://user:${HF_TOKEN}@huggingface.co/spaces/${HF_BACKEND_SPACE}" main || \
              echo "HF backend push failed - check HF_BACKEND_SPACE_REPO and HF_API_KEY secrets"
          else
            echo "HF backend secrets not configured, skipping backend sync"
            echo "Set HF_API_KEY and HF_BACKEND_SPACE_REPO in repository secrets"
          fi

  # Deploy static frontend to HuggingFace Spaces (optional)
  sync-frontend-to-hf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build frontend
        run: |
          cd frontend && npm ci && npm run build

      - name: Push frontend to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_API_KEY }}
          HF_SPACE_REPO: ${{ secrets.HF_SPACE_REPO_URL }}
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "GitHub Actions"

          if [ -n "$HF_SPACE_REPO" ] && [ -n "$HF_TOKEN" ]; then
            git clone "https://user:${HF_TOKEN}@huggingface.co/spaces/${HF_SPACE_REPO}" /tmp/hf-space || \
              mkdir -p /tmp/hf-space

            cat > /tmp/hf-space/README.md << 'EOF'
          ---
          title: Sentinel LLM Misuse Detector
          emoji: 🛡️
          colorFrom: red
          colorTo: blue
          sdk: static
          pinned: false
          ---

          # Sentinel - LLM Misuse Detection System

          Frontend for the Sentinel system for detecting misuse of Large Language Models.
          EOF

            cp -r frontend/out/* /tmp/hf-space/ 2>/dev/null || \
              cp -r frontend/.next/static /tmp/hf-space/ 2>/dev/null || true

            cd /tmp/hf-space
            git add .
            git commit -m "Sync frontend from GitHub $(date -u +%Y-%m-%dT%H:%M:%SZ)" || true
            git push "https://user:${HF_TOKEN}@huggingface.co/spaces/${HF_SPACE_REPO}" main || \
              echo "HF frontend push failed - check HF_SPACE_REPO_URL and HF_API_KEY secrets"
          else
            echo "HF frontend secrets not configured, skipping frontend sync"
            echo "Set HF_API_KEY and HF_SPACE_REPO_URL in repository secrets"
          fi

# NOTES:
# - HF_BACKEND_SPACE_REPO: "username/space-name" for the Docker backend Space
#   Backend URL will be: https://username-space-name.hf.space
# - HF_SPACE_REPO_URL: "username/space-name" for the optional static frontend Space
# - HF_API_KEY: HuggingFace access token with write permissions to both spaces
# - Docker backend Space must have sdk: docker set (handled by this workflow's README.md)
# - Set CORS_ORIGINS in the backend Space secrets to allow your Vercel frontend URL
