# CI/CD Pipeline
# - Tests and builds on every PR and push to main
# - Deploys backend (only) to Hugging Face Spaces Docker on push to main
# - Deploys frontend to Vercel on push to main
# - Runs smoke tests after deploy
name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"
  # Hardcoded – no secret needed for the URL itself
  HF_BACKEND_SPACE: "Arko007/security"
  BACKEND_URL: "https://arko007-security.hf.space"

jobs:
  # ── Backend: lint + test ────────────────────────────────────────────────────
  backend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run tests
        run: python -m pytest backend/tests/ -v --ignore=backend/tests/test_load.py
        env:
          FIREBASE_PROJECT_ID: "test-project"
          REDIS_URL: "redis://localhost:6379/0"

  # ── Frontend: lint + build ──────────────────────────────────────────────────
  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Lint
        run: cd frontend && npm run lint

      - name: Build
        run: cd frontend && npm run build
        env:
          NEXT_PUBLIC_API_URL: "https://arko007-security.hf.space"
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}

  # ── Deploy backend to Hugging Face Spaces (Docker) ─────────────────────────
  deploy-backend:
    needs: [backend-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Push backend Docker to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_API_KEY }}
        run: |
          set -e
          git config --global user.email "github-actions@github.com"
          git config --global user.name "GitHub Actions"

          HF_REMOTE="https://user:${HF_TOKEN}@huggingface.co/spaces/${{ env.HF_BACKEND_SPACE }}"

          # Clone existing Space, or init a fresh repo if it doesn't exist yet
          if git clone "$HF_REMOTE" /tmp/hf-backend 2>/dev/null; then
            echo "Cloned existing HF Space"
          else
            echo "Space not found or empty – initialising fresh repo"
            mkdir -p /tmp/hf-backend
            git -C /tmp/hf-backend init
            git -C /tmp/hf-backend remote add origin "$HF_REMOTE"
          fi

          # ── Wipe the staging area – ONLY backend files go to HF ──
          # This guarantees no frontend binaries, node_modules, .next, etc.
          rm -rf /tmp/hf-backend/*
          rm -rf /tmp/hf-backend/.gitattributes 2>/dev/null || true

          # HF Space metadata card (sdk:docker → HF builds the Dockerfile)
          cat > /tmp/hf-backend/README.md << 'HFEOF'
          ---
          title: Sentinel Backend API
          emoji: 🔒
          colorFrom: blue
          colorTo: red
          sdk: docker
          pinned: false
          app_port: 7860
          ---

          # Sentinel Backend API

          FastAPI backend for the Sentinel LLM Misuse Detection System.
          Exposes a REST API on port 7860.

          ## Secrets required (Space Settings → Repository secrets)
          - `FIREBASE_PROJECT_ID`
          - `FIREBASE_CREDENTIALS_JSON`
          - `REDIS_URL`
          - `HF_API_KEY`
          - `GROQ_API_KEY`
          - `CORS_ORIGINS` (your Vercel URL)
          - `QDRANT_URL` + `QDRANT_API_KEY` (optional)
          - `SENTRY_DSN` (optional)
          HFEOF

          # Dockerfile for HF Spaces (port 7860)
          cp Dockerfile.hf_space /tmp/hf-backend/Dockerfile

          # Backend Python source only – no frontend files whatsoever
          cp -r backend/ /tmp/hf-backend/backend/

          # Commit and push
          cd /tmp/hf-backend
          git add .
          git diff --cached --quiet && echo "Nothing changed, skipping push" && exit 0
          git commit -m "Deploy backend from GitHub ${{ github.sha }}"
          git push origin main --force
          echo "✅ Successfully pushed to HF Space ${{ env.HF_BACKEND_SPACE }}"

  # ── Deploy frontend to Vercel ───────────────────────────────────────────────
  deploy-frontend:
    needs: [frontend-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          cd frontend
          if [ -n "$VERCEL_TOKEN" ]; then
            npx vercel --prod --token="$VERCEL_TOKEN" \
              --build-env NEXT_PUBLIC_API_URL="https://arko007-security.hf.space" || \
              echo "Vercel deploy failed – check VERCEL_TOKEN secret"
          else
            echo "VERCEL_TOKEN not configured, skipping Vercel deploy"
          fi

  # ── Smoke tests (after both deploys) ───────────────────────────────────────────
  smoke-test:
    needs: [deploy-backend, deploy-frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Wait for HF Space to rebuild
        run: sleep 60

      - name: Smoke test – /health
        run: |
          curl -sf "${{ env.BACKEND_URL }}/health" \
            && echo "✅ /health OK" \
            || echo "⚠️ Health check failed (Space may still be cold-starting)"

      - name: Smoke test – /api/analyze
        run: |
          curl -sf -X POST "${{ env.BACKEND_URL }}/api/analyze" \
            -H "Content-Type: application/json" \
            -d '{"text": "This is a smoke test for the LLM misuse detection system."}' \
            && echo "✅ /api/analyze OK" \
            || echo "⚠️ Analyze endpoint check failed"
